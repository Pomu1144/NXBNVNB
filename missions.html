<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blazing — Missions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- PWA App Container -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="Blazing" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" href="assets/icons/achievement_icon.png" />
  <script src="js/pwa-register.js"></script>
  <link rel="stylesheet" href="css/missions.css" />
  <link rel="stylesheet" href="css/background.css" />
  <link rel="stylesheet" href="css/bottombar.css" />
</head>
<body class="page-missions">
  <!-- mission_bg.gif is actually an MP4 — use <video> for playback -->
  <video id="full-bg" autoplay muted loop playsinline
    style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(0.7);z-index:0;pointer-events:none;">
    <source src="assets/mission_bg.gif" type="video/mp4">
  </video>
  <div class="mission-page-container">
    <h1 class="page-title">MISSIONS</h1>
    <div class="mission-tabs"></div>
    <div class="mission-list-container">
      <div class="mission-list"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-bar-content">
      <button class="hud-button" id="btn-village" aria-label="Village"><img src="assets/icons/village_btm_btn.png" alt="Village"></button>
      <button class="hud-button" id="btn-characters" aria-label="Characters"><img src="assets/icons/characters_icon.png" alt="Characters" onerror="this.style.display='none'"></button>
      <button class="hud-button" id="btn-fusion" aria-label="Fusion"><img src="assets/icons/fusion_btm_btn.png" alt="Fusion"></button>
      <button class="hud-button" id="btn-teams" aria-label="Teams"><img src="assets/icons/teams_icon.png" alt="Teams"></button>
      <button class="hud-button" id="btn-tools" aria-label="Tools"><img src="assets/icons/guilds_icon.png" alt="Tools"></button>
      <button class="hud-button" id="btn-summon" aria-label="Summon"><img src="assets/icons/summon_btm_btn.png" alt="Summon"></button>
      <button class="hud-button active" id="btn-missions" aria-label="Missions"><img src="assets/icons/mission_btm_btn.png" alt="Missions"></button>
      <button class="hud-button" id="btn-inventory" aria-label="Inventory"><img src="assets/icons/inventory_icon.png" alt="Inventory"></button>
      <button class="hud-button" id="btn-shop" aria-label="Shop"><img src="assets/icons/shop_btm_btn.png" alt="Shop"></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script src="js/audio-manager.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/missions.js"></script>
  <script src="js/navigation.js"></script>
</body>
</html>
