<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blazing — Fusion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- PWA App Container -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="Blazing" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" href="assets/icons/achievement_icon.png" />
  <script src="js/pwa-register.js"></script>
  <link rel="stylesheet" href="css/fusion.css" />
  <link rel="stylesheet" href="css/background.css" />
  <link rel="stylesheet" href="css/bottombar.css" />
</head>
<body class="page-fusion">
  <div id="full-bg"></div>

  <!-- ==================== MAIN FUSION UI ==================== -->
  <main class="fusion-content">
    <h1 class="page-title">FUSION</h1>

    <div id="fusion-root" class="fusion-layout">

      <!-- ---- Left: Available Recipes ---- -->
      <section class="fusion-recipes-panel">
        <h2 class="panel-title">Fusion Recipes</h2>
        <div id="fusions-grid" class="fusions-grid"></div>
      </section>

      <!-- ---- Right: Active Fusion Workspace ---- -->
      <section class="fusion-workspace-panel">

        <!-- Unit Slots -->
        <div class="fusion-slots-row">
          <div class="fusion-slot-wrapper">
            <div id="slot-1" class="fusion-slot">
              <div class="slot-placeholder">
                <div class="slot-icon">+</div>
                <div class="slot-label">Select Unit 1</div>
              </div>
            </div>
            <div id="info-1" class="fusion-slot-info"></div>
          </div>

          <div class="fusion-plus-sign">+</div>

          <div class="fusion-slot-wrapper">
            <div id="slot-2" class="fusion-slot">
              <div class="slot-placeholder">
                <div class="slot-icon">+</div>
                <div class="slot-label">Select Unit 2</div>
              </div>
            </div>
            <div id="info-2" class="fusion-slot-info"></div>
          </div>

          <div class="fusion-arrow-sign">→</div>

          <div class="fusion-slot-wrapper">
            <div id="result-slot" class="fusion-slot result-slot">
              <div class="slot-placeholder">
                <div class="slot-icon">?</div>
                <div class="slot-label">Result</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Requirements -->
        <div id="fusion-requirements" class="fusion-requirements" style="display:none;">
          <h3 class="requirements-title">Requirements</h3>
          <div id="requirements-grid" class="requirements-grid"></div>
        </div>

        <!-- Action Buttons -->
        <div class="fusion-actions">
          <button id="btn-fuse" class="fusion-btn fuse-btn" disabled>Fuse</button>
          <button id="btn-clear" class="fusion-btn clear-btn">Clear</button>
        </div>

      </section>
    </div>
  </main>

  <!-- ==================== UNIT SELECTOR MODAL ==================== -->
  <div id="unit-selector-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">Select Unit</h2>
        <div class="modal-filters">
          <input type="text" id="unit-search" class="modal-search" placeholder="Search by name…">
          <select id="tier-filter" class="modal-tier-filter">
            <option value="">All Tiers</option>
            <option value="3S">3★</option>
            <option value="4S">4★</option>
            <option value="5S">5★</option>
            <option value="6S">6★</option>
            <option value="6SB">6★B</option>
            <option value="7S">7★</option>
          </select>
        </div>
      </div>
      <div id="units-grid" class="units-grid"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="fusion-btn clear-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ==================== FUSION SUCCESS MODAL ==================== -->
  <div id="fusion-success-modal" class="modal-overlay success-modal" aria-hidden="true">
    <div class="modal-panel success-panel">
      <h2 class="success-title">Fusion Complete!</h2>
      <div id="success-content" class="success-content"></div>
      <button id="success-close" class="fusion-btn fuse-btn">Awesome!</button>
    </div>
  </div>

  <!-- ==================== BOTTOM NAV ==================== -->
  <div class="bottom-bar">
    <div class="bottom-bar-content">
      <button class="hud-button" id="btn-village" aria-label="Village"><img src="assets/icons/village_btm_btn.png" alt="Village"></button>
      <button class="hud-button" id="btn-characters" aria-label="Characters"><img src="assets/icons/characters_icon.png" alt="Characters" onerror="this.style.display='none'"></button>
      <button class="hud-button active" id="btn-fusion" aria-label="Fusion"><img src="assets/icons/fusion_btm_btn.png" alt="Fusion"></button>
      <button class="hud-button" id="btn-teams" aria-label="Teams"><img src="assets/icons/teams_icon.png" alt="Teams"></button>
      <button class="hud-button" id="btn-tools" aria-label="Tools"><img src="assets/icons/guilds_icon.png" alt="Tools"></button>
      <button class="hud-button" id="btn-summon" aria-label="Summon"><img src="assets/icons/summon_btm_btn.png" alt="Summon"></button>
      <button class="hud-button" id="btn-missions" aria-label="Missions"><img src="assets/icons/mission_btm_btn.png" alt="Missions"></button>
      <button class="hud-button" id="btn-inventory" aria-label="Inventory"><img src="assets/icons/inventory_icon.png" alt="Inventory"></button>
      <button class="hud-button" id="btn-shop" aria-label="Shop"><img src="assets/icons/shop_btm_btn.png" alt="Shop"></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script src="js/audio-manager.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/character_inv.js?v=3"></script>
  <script src="js/progression.js"></script>
  <script src="js/fusion.js"></script>
  <script src="js/navigation.js"></script>
</body>
</html>
