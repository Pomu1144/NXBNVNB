<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blazing — Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <!-- PWA App Container -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="Blazing" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" href="assets/icons/achievement_icon.png" />
  <script src="js/pwa-register.js"></script>
  <link rel="stylesheet" href="css/bottombar.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap");

    *, *::before, *::after { box-sizing: border-box; }
    body::-webkit-scrollbar, *::-webkit-scrollbar { display: none; }
    body, * { -ms-overflow-style: none; scrollbar-width: none; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #080810;
      color: #eee6d1;
      font-family: "Cinzel", serif;
      overflow-x: hidden;
    }

    /* ── Background ─────────────────────────────────────────── */
    #arena-bg {
      position: fixed;
      inset: 0;
      background-image: url('assets/Main Background/arena_background.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #arena-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.25) 35%,
        rgba(0,0,0,0.65) 100%
      );
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .arena-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px 16px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1.arena-title {
      font-size: clamp(26px, 5vw, 52px);
      color: #d4af37;
      letter-spacing: clamp(3px, 0.6vw, 8px);
      text-shadow:
        0 4px 20px rgba(212,175,55,0.9),
        0 0 60px rgba(255,120,0,0.45),
        0 2px 4px rgba(0,0,0,0.9);
      margin: 0 0 6px;
      text-align: center;
    }

    .arena-subtitle {
      font-size: clamp(10px, 1.5vw, 14px);
      color: rgba(255,220,150,0.7);
      letter-spacing: 2px;
      margin: 0 0 28px;
      text-align: center;
    }

    /* ── Player Rank Card ───────────────────────────────────── */
    .player-rank-card {
      background: rgba(10,10,20,0.88);
      border: 2px solid rgba(212,175,55,0.5);
      border-radius: 14px;
      padding: 18px 26px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }

    .rank-badge {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ffd700, #a7822c 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(255,215,0,0.6);
      box-shadow: 0 0 16px rgba(255,215,0,0.4);
    }

    .rank-badge-stars {
      font-size: 9px;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
    }

    .rank-badge-label {
      font-size: 7px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.2;
      margin-top: 2px;
    }

    .rank-info { flex: 1; }

    .rank-name {
      font-size: 1.1rem;
      color: #d4af37;
      font-weight: 700;
    }

    .rank-tier-label {
      font-size: 0.75rem;
      color: rgba(217,179,98,0.6);
      margin-top: 2px;
    }

    .rank-stars-bar {
      margin-top: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }

    .rank-stars-fill {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, #d4af37, #ffd700);
      transition: width 0.5s ease;
    }

    .rank-stars-text {
      font-size: 0.7rem;
      color: rgba(217,179,98,0.65);
      margin-top: 4px;
    }

    /* ── Action Buttons ─────────────────────────────────────── */
    .arena-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .arena-btn {
      font-family: "Cinzel", serif;
      font-size: clamp(10px, 1.3vw, 13px);
      font-weight: 600;
      letter-spacing: 1px;
      padding: clamp(10px,1.5vh,14px) clamp(18px,3vw,32px);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    }

    .arena-btn-primary {
      background: linear-gradient(135deg, #a7822c, #d4af37);
      border: 2px solid rgba(212,175,55,0.7);
      color: #0a0a0a;
    }

    .arena-btn-primary:hover {
      background: linear-gradient(135deg, #d4af37, #ffd700);
      box-shadow: 0 0 24px rgba(212,175,55,0.6), 0 4px 14px rgba(0,0,0,0.6);
      transform: translateY(-2px);
    }

    .arena-btn-secondary {
      background: rgba(10,10,20,0.85);
      border: 2px solid rgba(212,175,55,0.35);
      color: #d4af37;
    }

    .arena-btn-secondary:hover {
      border-color: rgba(212,175,55,0.7);
      background: rgba(212,175,55,0.12);
      transform: translateY(-2px);
    }

    .arena-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── Ranking Table ──────────────────────────────────────── */
    .ranking-section {
      width: 100%;
      max-width: 680px;
    }

    .ranking-section-title {
      font-size: 0.85rem;
      color: rgba(217,179,98,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }

    .rank-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(8,8,16,0.85);
      border: 1px solid rgba(217,179,98,0.15);
      border-radius: 12px;
      overflow: hidden;
    }

    .rank-table thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: rgba(217,179,98,0.6);
      border-bottom: 1px solid rgba(217,179,98,0.15);
      background: rgba(217,179,98,0.05);
    }

    .rank-table tbody tr {
      border-bottom: 1px solid rgba(217,179,98,0.07);
      transition: background 0.15s;
    }

    .rank-table tbody tr:last-child { border-bottom: none; }
    .rank-table tbody tr:hover { background: rgba(217,179,98,0.06); }

    .rank-table tbody tr.current-rank {
      background: rgba(212,175,55,0.12);
      border-left: 3px solid #d4af37;
    }

    .rank-table tbody td {
      padding: 10px 14px;
      font-size: 0.8rem;
    }

    .rank-name-cell {
      color: #d4af37;
      font-weight: 600;
    }

    .rank-tier-cell {
      color: rgba(238,230,209,0.6);
      font-size: 0.72rem;
    }

    .rank-stars-cell {
      color: rgba(238,230,209,0.85);
      font-size: 0.75rem;
    }

    .rank-star-icon { width: 12px; height: 12px; vertical-align: middle; margin-right: 1px; }
    .rank-star-text { color: #ffd700; font-size: 0.75rem; }
    .rank-stars-imgs { display: flex; align-items: center; gap: 1px; }

    /* ── Back link ──────────────────────────────────────────── */
    .arena-back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 22px;
      background: rgba(10,10,20,0.85);
      border: 2px solid rgba(212,175,55,0.5);
      border-radius: 8px;
      color: #d4af37;
      font-family: "Cinzel", serif;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .arena-back-btn:hover {
      background: rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.9);
      box-shadow: 0 0 20px rgba(212,175,55,0.4);
    }

    @media (max-width: 500px) {
      .player-rank-card { padding: 14px 16px; }
      .rank-badge { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <div id="arena-bg"></div>

  <div class="arena-page">
    <h1 class="arena-title">ARENA</h1>
    <p class="arena-subtitle">Prove your worth as a shinobi</p>

    <!-- Player's current rank -->
    <div class="player-rank-card" id="player-rank-card">
      <div class="rank-badge" id="rank-badge">
        <div class="rank-badge-stars" id="rank-badge-stars">☆☆</div>
        <div class="rank-badge-label" id="rank-badge-label">Academy<br>Student</div>
      </div>
      <div class="rank-info">
        <div class="rank-name" id="rank-name-display">Academy Student</div>
        <div class="rank-tier-label" id="rank-tier-display">Tier 2 — 0 / 2 Stars</div>
        <div class="rank-stars-bar">
          <div class="rank-stars-fill" id="rank-stars-fill" style="width:0%"></div>
        </div>
        <div class="rank-stars-text" id="rank-stars-text">0 Arena Stars total</div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="arena-actions">
      <button class="arena-btn arena-btn-primary" id="btn-battle-arena" onclick="openArenaBattle()">
        Battle
      </button>
      <button class="arena-btn arena-btn-secondary" onclick="openDefenseSetup()">
        Set Defense
      </button>
      <button class="arena-btn arena-btn-secondary" onclick="openSeasonRewards()">
        Rewards
      </button>
      <button class="arena-btn arena-btn-secondary" onclick="toggleRanksTable()">
        Ranks
      </button>
    </div>

    <!-- Collapsible ranking table (hidden by default) -->
    <div class="ranking-section" id="ranking-section" style="display:none;">
      <div class="ranking-section-title">Rank Progression</div>
      <table class="rank-table" id="rank-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Tiers</th>
            <th>Stars Required</th>
          </tr>
        </thead>
        <tbody id="rank-table-body"></tbody>
      </table>
    </div>

    <a href="village.html" class="arena-back-btn">← Return to Village</a>
  </div>

  <!-- Bottom navigation bar -->
  <div class="bottom-bar">
    <div class="bottom-bar-content">
      <button class="hud-button" id="btn-village" aria-label="Village">
        <img src="assets/icons/village_btm_btn.png" alt="Village">
      </button>
      <button class="hud-button" id="btn-characters" aria-label="Characters">
        <img src="assets/icons/characters_icon.png" alt="Characters" onerror="this.style.display='none'">
      </button>
      <button class="hud-button" id="btn-fusion" aria-label="Fusion">
        <img src="assets/icons/fusion_btm_btn.png" alt="Fusion">
      </button>
      <button class="hud-button" id="btn-teams" aria-label="Teams">
        <img src="assets/icons/teams_icon.png" alt="Teams">
      </button>
      <button class="hud-button" id="btn-tools" aria-label="Tools">
        <img src="assets/icons/guilds_icon.png" alt="Tools">
      </button>
      <button class="hud-button" id="btn-summon" aria-label="Summon">
        <img src="assets/icons/summon_btm_btn.png" alt="Summon">
      </button>
      <button class="hud-button" id="btn-missions" aria-label="Missions">
        <img src="assets/icons/mission_btm_btn.png" alt="Missions">
      </button>
      <button class="hud-button" id="btn-inventory" aria-label="Inventory">
        <img src="assets/icons/inventory_icon.png" alt="Inventory">
      </button>
      <button class="hud-button" id="btn-shop" aria-label="Shop">
        <img src="assets/icons/shop_btm_btn.png" alt="Shop">
      </button>
    </div>
  </div>

  <script src="js/resources.js"></script>
  <script>
  // ── Arena Rank Definitions ──────────────────────────────────────────────
  const ARENA_RANKS = [
    { name: 'Academy Student', tiers: 2, starsPerTier: 2 },
    { name: 'Genin',           tiers: 3, starsPerTier: 3 },
    { name: 'Chunin',          tiers: 3, starsPerTier: 4 },
    { name: 'Special Jounin',  tiers: 2, starsPerTier: 4 },
    { name: 'Jounin',          tiers: 2, starsPerTier: 5 },
    { name: 'Elite Jounin',    tiers: 2, starsPerTier: 5 },
    { name: 'ANBU',            tiers: 2, starsPerTier: 6 },
    { name: 'ANBU Captain',    tiers: 2, starsPerTier: 6 },
    { name: 'Shadow Kage',     tiers: 1, starsPerTier: 7  },
    { name: 'Sannin',          tiers: 1, starsPerTier: 8  },
    { name: 'Kage',            tiers: 1, starsPerTier: 10 },
    { name: 'Six Paths',       tiers: 1, starsPerTier: 12 },
    { name: 'Shinobi Legend',  tiers: 1, starsPerTier: 15 },
  ];

  function buildRankList() {
    const list = [];
    ARENA_RANKS.forEach(r => {
      for (let t = r.tiers; t >= 1; t--) {
        list.push({
          name: r.name,
          tier: r.tiers > 1 ? `T${t}` : 'T1',
          starsNeeded: r.starsPerTier,
          label: r.tiers > 1 ? `${r.name} T${t}` : r.name,
          totalStarsLabel: r.tiers > 1 ? `${r.starsPerTier} ★ per tier` : `${r.starsPerTier} ★`
        });
      }
    });
    return list;
  }

  function getArenaStars() {
    return Number(localStorage.getItem('arena_stars') || 0);
  }

  function getCurrentRankIndex(stars) {
    const list = buildRankList();
    let cumulative = 0;
    for (let i = 0; i < list.length; i++) {
      cumulative += list[i].starsNeeded;
      if (stars < cumulative) return { idx: i, starsInTier: stars - (cumulative - list[i].starsNeeded), rank: list[i] };
    }
    return { idx: list.length - 1, starsInTier: stars, rank: list[list.length - 1] };
  }

  function renderRankTable() {
    const tbody = document.getElementById('rank-table-body');
    if (!tbody) return;
    const stars = getArenaStars();
    const { idx } = getCurrentRankIndex(stars);
    const list = buildRankList();

    const starImg = '<img src="assets/ui/NormalStar.png" class="rank-star-icon" alt="*" onerror="this.style.display=\'none\'">';
    tbody.innerHTML = list.map((r, i) => `
      <tr class="${i === idx ? 'current-rank' : ''}">
        <td class="rank-name-cell">${r.label}</td>
        <td class="rank-tier-cell">${r.tier}</td>
        <td class="rank-stars-cell"><span class="rank-stars-imgs">${starImg} <span class="rank-star-text">${r.totalStarsLabel}</span></span></td>
      </tr>`).join('');
  }

  function renderPlayerRank() {
    const stars = getArenaStars();
    const { idx, starsInTier, rank } = getCurrentRankIndex(stars);

    document.getElementById('rank-name-display').textContent = rank.label;
    document.getElementById('rank-tier-display').textContent = `${rank.tier} — ${starsInTier} / ${rank.starsNeeded} ★`;
    document.getElementById('rank-badge-label').textContent = rank.name.replace(' ', '\n');
    const starHtml = '<img src="assets/ui/NormalStar.png" style="width:10px;height:10px;" onerror="this.style.display=\'none\'">';
    document.getElementById('rank-badge-stars').innerHTML = starHtml.repeat(Math.min(starsInTier, rank.starsNeeded)) || starHtml;
    document.getElementById('rank-stars-text').textContent = `${stars} Arena Stars total`;

    const pct = Math.min(100, Math.round((starsInTier / rank.starsNeeded) * 100));
    document.getElementById('rank-stars-fill').style.width = pct + '%';
    document.getElementById('rank-tier-display').textContent =
      `${rank.tier} — ${starsInTier} / ${rank.starsNeeded} Stars`;
  }

  renderRankTable();
  renderPlayerRank();

  // ── Arena Battle Maps ────────────────────────────────────────────────────
  const ARENA_MAPS = [
    'bg_020101_mori','bg_030101_kaido','bg_040101_heigen','bg_050101_iwaba',
    'bg_060101_kouya','bg_070101_kawara','bg_080101_sabaibaru','bg_090101_oohashi',
    'bg_100101_shinomori','bg_110101_yosen','bg_120101_honsen','bg_130101_tanzaku',
    'bg_140101_syumatu','bg_150101_suna','bg_160101_akatuki','bg_170101_tenti',
    'bg_180101_oroti','bg_190101_hinotera','bg_200101_kankin','bg_220101_konoha_houkai',
    'bg_230101_utiha','bg_240101_tetu','bg_250101_samurai','bg_260101_unrai',
    'bg_270101_kitaajito','bg_280101_doukutu','bg_290101_kaigan','bg_300101_sabaku',
    'bg_310101_shinjyu','bg_330101_konohasato','bg_340101_kihinseki','bg_350101_kinoko',
    'bg_360101_takenoko','bg_370101_senjyou','bg_400101_ame_soto','bg_420101_utiha2',
    'bg_440101_shinjitu','bg_450101_kukan','bg_460101_yougan','bg_470101_hyouzan',
    'bg_490101_tyojuryoku','bg_500101_fusyujyou','bg_510101_shinratensei',
    'bg_520101_ninkaibuto','bg_530101_jigokudani','bg_540101_rpg','bg_580101_syuumatunotani',
    'bg_590101_hondou','bg_600101_isidan'
  ];

  function randomMap() {
    return 'assets/maps/' + ARENA_MAPS[Math.floor(Math.random() * ARENA_MAPS.length)] + '.png';
  }

  // ── Arena Battle Flow ────────────────────────────────────────────────────
  async function openArenaBattle() {
    // Determine current rank for difficulty scaling
    const stars = getArenaStars();
    const { rank } = getCurrentRankIndex(stars);

    // Decide which ranks can be opponents (Academy Student through Chunin → lower tier enemies)
    const lowRanks = ['Academy Student', 'Genin', 'Chunin'];
    const isLowRank = lowRanks.includes(rank.name);

    // Load characters and pick random opponents
    let allChars = [];
    try {
      const r = await fetch('data/characters.json');
      const data = await r.json();
      allChars = Array.isArray(data) ? data : Object.values(data);
    } catch (e) {
      console.error('[Arena] Failed to load characters:', e);
    }

    if (allChars.length === 0) {
      alert('Could not load enemy data.');
      return;
    }

    // For lower ranks pick enemies filtered to lower rarities, else open pool
    let pool = allChars;
    if (isLowRank) {
      const low = allChars.filter(c => {
        const r = parseInt(c.rarity) || parseInt((c.starMinCode || '').charAt(0)) || 1;
        return r <= 4;
      });
      if (low.length >= 4) pool = low;
    }

    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const enemyTeam = shuffle(pool).slice(0, 4).map(c => {
      // Resolve portrait: try artByTier first, fallback to top-level portrait
      const tierCode = c.starMaxCode || c.starMinCode || '3S';
      const portrait = (c.artByTier && c.artByTier[tierCode]?.portrait)
        || c.portrait || c.full || '';
      return {
        id: c.id,
        name: c.name,
        version: c.version || '',
        rarity: c.rarity || parseInt((c.starMinCode || '3').charAt(0)) || 3,
        icon: portrait,
        hp: (c.statsMax && c.statsMax.hp) || 5000,
        atk: (c.statsMax && c.statsMax.atk) || 800,
        spd: (c.statsMax && (c.statsMax.speed || c.statsMax.spd)) || 100,
        skills: c.skills || {},
        element: c.element || null,
      };
    });

    // Show offense team picker first, then VS modal
    openArenaTeamPicker('offense', enemyTeam);
  }

  // ── Arena Team Picker ────────────────────────────────────────────────────
  async function openArenaTeamPicker(mode, enemyTeam = null) {
    // Load teams + inventory + characters
    let savedTeams = {};
    let inventory = {};
    let allChars = {};
    try { savedTeams = JSON.parse(localStorage.getItem('blazing_teams_v1') || '{}'); } catch(e) {}
    try {
      const invArr = JSON.parse(localStorage.getItem('blazing_inventory_v2') || '[]');
      if (Array.isArray(invArr)) invArr.forEach(inst => { inventory[inst.uid] = inst; });
    } catch(e) {}
    try {
      const r = await fetch('data/characters.json');
      const d = await r.json();
      allChars = Array.isArray(d) ? Object.fromEntries(d.map(c=>[c.id,c])) : d;
    } catch(e) {}

    const currentDefenseTeam = (() => {
      try { return JSON.parse(localStorage.getItem('arena_defense_team') || 'null'); } catch(e) { return null; }
    })();
    const currentOffenseTeam = (() => {
      try { return JSON.parse(localStorage.getItem('arena_offense_team') || 'null'); } catch(e) { return null; }
    })();

    // Build team cards HTML
    function buildTeamCard(teamNum) {
      const team = savedTeams[teamNum] || {};
      const slots = ['front-1','front-2','front-3','front-4','back-1','back-2','back-3','back-4','commander'];
      const members = slots.map(s => {
        const entry = team[s];
        if (!entry) return null;
        const inst = inventory[entry.uid] || { charId: entry.charId, level: 1, tierCode: null };
        const char = allChars[inst.charId || entry.charId] || null;
        if (!char) return null;
        const tierCode = inst.tierCode || char.starMaxCode || char.starMinCode || '3S';
        const portrait = (char.artByTier && char.artByTier[tierCode]?.portrait) || char.portrait || char.full || '';
        const jutsuName = char.skills?.jutsu?.name || 'Jutsu';
        const jutsuTier = char.skills?.jutsu?.byTier?.[tierCode] || Object.values(char.skills?.jutsu?.byTier || {})[0] || {};
        const chakra = jutsuTier.chakraCost || '—';
        const hp = char.statsMax?.hp || char.statsBase?.hp || 0;
        const atk = char.statsMax?.atk || char.statsBase?.atk || 0;
        return { portrait, name: char.name, version: char.version || '', jutsuName, chakra, hp, atk, rarity: char.rarity || 3 };
      }).filter(Boolean);

      if (members.length === 0) {
        return `<div class="atp-team-card empty" data-team="${teamNum}">
          <div class="atp-team-label">Team ${teamNum}</div>
          <div class="atp-empty-msg">No characters assigned</div>
        </div>`;
      }

      const rarityBorder = r => r >= 7 ? '#ff2244' : r >= 6 ? '#ffd700' : r >= 5 ? '#c084fc' : '#4ade80';
      const memberCards = members.map(m => `
        <div class="atp-member">
          <div class="atp-portrait" style="background-image:url('${m.portrait}');border-color:${rarityBorder(m.rarity)}"></div>
          <div class="atp-member-info">
            <div class="atp-member-name">${m.name}</div>
            ${m.version ? `<div class="atp-member-ver">${m.version}</div>` : ''}
            <div class="atp-jutsu-row">
              <div class="atp-jutsu-icon" style="background-image:url('${m.portrait}')"></div>
              <div class="atp-jutsu-name">${m.jutsuName}</div>
              <div class="atp-chakra">${m.chakra}C</div>
            </div>
          </div>
        </div>`).join('');

      const isActiveMode = mode === 'offense' ? currentOffenseTeam === teamNum : currentDefenseTeam === teamNum;
      return `<div class="atp-team-card ${isActiveMode ? 'atp-active' : ''}" data-team="${teamNum}" onclick="selectArenaTeam(${teamNum})">
        <div class="atp-team-label">Team ${teamNum}</div>
        <div class="atp-members">${memberCards}</div>
        ${isActiveMode ? '<div class="atp-active-badge">Current</div>' : ''}
      </div>`;
    }

    const title = mode === 'offense' ? 'Select Offense Team' : 'Select Defense Team';
    const desc  = mode === 'offense'
      ? 'Choose which team you will battle with in the Arena.'
      : 'Choose which team opponents will face when they challenge you.';

    document.getElementById('arena-team-picker')?.remove();
    const modal = document.createElement('div');
    // Build resolved player team data for all 3 teams (for use in VS modal)
    const resolvedTeams = {};
    for (let tn = 1; tn <= 8; tn++) {
      const team = savedTeams[tn] || {};
      const slots = ['front-1','front-2','front-3','front-4','back-1','back-2','back-3','back-4','commander'];
      resolvedTeams[tn] = slots.map(s => {
        const entry = team[s];
        if (!entry) return null;
        const inst = inventory[entry.uid] || { charId: entry.charId };
        const char = allChars[inst.charId || entry.charId] || null;
        if (!char) return null;
        const tierCode = inst.tierCode || char.starMaxCode || char.starMinCode || '3S';
        const portrait = (char.artByTier && char.artByTier[tierCode]?.portrait) || char.portrait || char.full || '';
        return { name: char.name, version: char.version || '', portrait, rarity: char.rarity || 3 };
      }).filter(Boolean);
    }

    modal.id = 'arena-team-picker';
    modal.dataset.mode = mode;
    modal.dataset.resolvedTeams = JSON.stringify(resolvedTeams);
    if (enemyTeam) modal.dataset.enemyTeam = JSON.stringify(enemyTeam);

    modal.innerHTML = `
      <div class="atp-overlay" onclick="document.getElementById('arena-team-picker').remove()"></div>
      <div class="atp-panel">
        <div class="atp-header">
          <div>
            <div class="atp-title">${title}</div>
            <div class="atp-desc">${desc}</div>
          </div>
          <button class="atp-close" onclick="document.getElementById('arena-team-picker').remove()">X</button>
        </div>
        <div class="atp-teams">
          ${[1,2,3,4,5,6,7,8].map(n => buildTeamCard(n)).join('')}
        </div>
        <div class="atp-footer">
          <a href="teams.html" class="atp-link-btn">Manage Teams</a>
          <button class="atp-confirm" id="atp-confirm-btn" onclick="confirmArenaTeam()" disabled>
            ${mode === 'offense' ? 'Battle with this team' : 'Set as Defense Team'}
          </button>
        </div>
      </div>`;

    _injectArenaTeamPickerStyles();
    document.body.appendChild(modal);

    // Auto-select current team if set
    const currentNum = mode === 'offense' ? currentOffenseTeam : currentDefenseTeam;
    if (currentNum) {
      window._arenaPickerSelected = currentNum;
      document.getElementById('atp-confirm-btn').disabled = false;
    }
  }

  window._arenaPickerSelected = null;

  function selectArenaTeam(teamNum) {
    window._arenaPickerSelected = teamNum;
    document.querySelectorAll('.atp-team-card').forEach(c => {
      c.classList.toggle('atp-selected', parseInt(c.dataset.team) === teamNum);
    });
    const btn = document.getElementById('atp-confirm-btn');
    if (btn) btn.disabled = false;
  }

  async function confirmArenaTeam() {
    const modal = document.getElementById('arena-team-picker');
    if (!modal) return;
    const mode = modal.dataset.mode;
    const teamNum = window._arenaPickerSelected;
    if (!teamNum) return;

    if (mode === 'defense') {
      localStorage.setItem('arena_defense_team', JSON.stringify(teamNum));
      modal.remove();
      _showArenaInfoModal('Defense Team Set',
        `<p style="color:#6bcf7f;text-align:center;padding:16px 0;font-size:15px">Team ${teamNum} has been set as your Arena Defense Team.</p>`);
      return;
    }

    // Offense: store and proceed to VS modal
    localStorage.setItem('arena_offense_team', JSON.stringify(teamNum));

    let enemyTeam = [];
    let resolvedTeams = {};
    try { enemyTeam = JSON.parse(modal.dataset.enemyTeam || '[]'); } catch(e) {}
    try { resolvedTeams = JSON.parse(modal.dataset.resolvedTeams || '{}'); } catch(e) {}
    modal.remove();

    const playerMembers = resolvedTeams[teamNum] || [];
    showTeamSelectorModal(playerMembers, enemyTeam);
  }

  function showTeamSelectorModal(playerMembers, enemyTeam) {
    // playerMembers: pre-resolved array of { name, version, portrait, rarity }
    // enemyTeam:     array from openArenaBattle

    const mapPath = randomMap();

    const rarityColor = r => r >= 6 ? '#ff4444' : r >= 5 ? '#ffd700' : r >= 4 ? '#a78bfa' : '#6bcf7f';

    const enemyHTML = enemyTeam.map(e => `
      <div class="arena-team-member">
        <div class="arena-member-avatar" style="${e.icon ? `background-image:url('${e.icon}');` : 'background:#333'}"></div>
        <div class="arena-member-name">${e.name}${e.version ? `<br><span style="font-size:9px;opacity:0.7">${e.version}</span>` : ''}</div>
        <div class="arena-member-stats">
          <span title="HP">HP ${(e.hp/1000).toFixed(1)}k</span>
          <span title="ATK">ATK ${e.atk}</span>
          <span title="SPD">SPD ${e.spd}</span>
        </div>
      </div>`).join('');

    const playerHTML = playerMembers.length > 0
      ? playerMembers.slice(0, 4).map(m => `
          <div class="arena-team-member">
            <div class="arena-member-avatar" style="${m.portrait ? `background-image:url('${m.portrait}');` : 'background:#444'}"></div>
            <div class="arena-member-name">${m.name}${m.version ? `<br><span style="font-size:9px;opacity:0.7">${m.version}</span>` : ''}</div>
          </div>`).join('')
      : '<div class="arena-no-team">No team set — default characters will be used</div>';

    const modal = document.createElement('div');
    modal.id = 'arena-team-modal';
    modal.innerHTML = `
      <div class="arena-modal-overlay" onclick="document.getElementById('arena-team-modal').remove()"></div>
      <div class="arena-modal-panel">
        <div class="arena-modal-header">
          <span class="arena-modal-title">Arena Battle</span>
          <button class="arena-modal-close" onclick="document.getElementById('arena-team-modal').remove()">X</button>
        </div>
        <div class="arena-modal-body">
          <div class="arena-teams-row">
            <div class="arena-team-col">
              <div class="arena-team-label">Your Team</div>
              <div class="arena-team-grid">${playerHTML}</div>
            </div>
            <div class="arena-vs-badge">VS</div>
            <div class="arena-team-col">
              <div class="arena-team-label enemy-label">Enemy Team</div>
              <div class="arena-team-grid">${enemyHTML}</div>
            </div>
          </div>
          <div class="arena-map-preview" style="background-image:url('${mapPath}')">
            <span class="arena-map-label">Battle Map</span>
          </div>
        </div>
        <div style="margin-top:14px;padding:10px 14px;background:rgba(212,175,55,0.08);border-radius:8px;border:1px solid rgba(212,175,55,0.2);text-align:center;font-size:12px;color:#b8985f;letter-spacing:1px;">
          Teams locked in — Battle will begin immediately
        </div>
        <button class="arena-start-match-btn" onclick="startArenaBattle(${JSON.stringify(enemyTeam).replace(/"/g, '&quot;')}, '${mapPath}')">
          BEGIN BATTLE
        </button>
      </div>`;

    // Inject styles
    if (!document.getElementById('arena-battle-modal-styles')) {
      const style = document.createElement('style');
      style.id = 'arena-battle-modal-styles';
      style.textContent = `
        #arena-team-modal { position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center; }
        .arena-modal-overlay { position:absolute;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px); }
        .arena-modal-panel {
          position:relative;background:linear-gradient(135deg,rgba(15,20,45,0.98),rgba(8,10,25,0.98));
          border:3px solid #b8985f;border-radius:18px;padding:28px;width:min(700px,95vw);
          max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(184,152,95,0.4);
        }
        .arena-modal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid rgba(184,152,95,0.3); }
        .arena-modal-title { font-size:22px;font-weight:700;color:#d4af37;letter-spacing:2px; }
        .arena-modal-close { background:rgba(220,53,69,0.2);border:2px solid rgba(220,53,69,0.5);color:#ff6b6b;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer; }
        .arena-modal-body { display:flex;flex-direction:column;gap:18px; }
        .arena-teams-row { display:flex;align-items:center;gap:12px;justify-content:space-between; }
        .arena-team-col { flex:1;display:flex;flex-direction:column;gap:10px; }
        .arena-team-label { font-size:13px;font-weight:700;color:#d4af37;text-align:center;letter-spacing:1px;text-transform:uppercase; }
        .enemy-label { color:#ff6b6b; }
        .arena-team-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
        .arena-team-member { display:flex;flex-direction:column;align-items:center;gap:5px; }
        .arena-member-avatar { width:60px;height:60px;border-radius:8px;background-size:cover;background-position:center top;background-color:#222; }
        .arena-member-name { font-size:11px;color:#f0e6d1;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis; }
        .arena-member-stats { display:flex;gap:4px;font-size:9px;color:#a0a0c0;flex-wrap:wrap;justify-content:center;margin-top:2px; }
        .arena-member-stats span { background:rgba(255,255,255,0.08);padding:1px 4px;border-radius:3px; }
        .arena-no-team { color:#b8985f;font-size:13px;text-align:center;padding:20px; }
        .arena-vs-badge { font-size:28px;font-weight:900;color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,0.8);flex-shrink:0; }
        .arena-map-preview { height:80px;border-radius:10px;background-size:cover;background-position:center;border:2px solid #b8985f;display:flex;align-items:flex-end;padding:8px; }
        .arena-map-label { font-size:11px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:4px; }
        .arena-start-match-btn {
          margin-top:18px;width:100%;padding:16px;font-size:18px;font-weight:700;
          background:linear-gradient(135deg,#8b1a1a,#cc2222,#8b1a1a);
          border:3px solid #ff4444;color:#fff;border-radius:10px;cursor:pointer;
          text-shadow:0 2px 4px rgba(0,0,0,0.8);letter-spacing:2px;
          box-shadow:0 0 30px rgba(204,34,34,0.5);transition:all 0.3s;
        }
        .arena-start-match-btn:hover { background:linear-gradient(135deg,#aa2222,#ee3333,#aa2222);transform:translateY(-2px);box-shadow:0 0 40px rgba(238,51,51,0.7); }
      `;
      document.head.appendChild(style);
    }

    document.body.appendChild(modal);
  }

  function startArenaBattle(enemyTeam, mapPath) {
    localStorage.setItem('arena_battle_mode', '1');
    localStorage.setItem('arena_enemies', JSON.stringify(enemyTeam));
    localStorage.setItem('arena_map', mapPath);
    window.location.href = 'battle.html';
  }

  function toggleRanksTable() {
    const section = document.getElementById('ranking-section');
    if (!section) return;
    const isHidden = section.style.display === 'none';
    section.style.display = isHidden ? 'block' : 'none';
  }

  function openDefenseSetup() {
    openArenaTeamPicker('defense');
  }

  function openSeasonRewards() {
    const stars = getArenaStars();
    const { rank } = getCurrentRankIndex(stars);
    const pearlIcon = '<img src="assets/icons/currency/ninjapearl.png" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;">';
    const ryoIcon   = '<img src="assets/icons/currency/ryo.png" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;">';
    const shinIcon  = '<img src="assets/icons/currency/shinobite.png" style="width:14px;height:14px;vertical-align:middle;margin-right:3px;">';
    _showArenaInfoModal('Season Rewards',
      `<p style="color:#b8a080;line-height:1.6;margin-bottom:14px">Earn Arena Stars by winning battles to climb the ranks and claim season rewards.</p>
       <div style="display:flex;flex-direction:column;gap:8px">
         ${[
           { rank: 'Genin',         pearl: 10,  ryo: 5000,   shin: 2   },
           { rank: 'Chunin',        pearl: 20,  ryo: 10000,  shin: 5   },
           { rank: 'Jounin',        pearl: 50,  ryo: 25000,  shin: 10  },
           { rank: 'ANBU Captain',  pearl: 100, ryo: 50000,  shin: 20  },
           { rank: 'Kage',          pearl: 200, ryo: 100000, shin: 50  },
           { rank: 'Shinobi Legend',pearl: 500, ryo: 250000, shin: 100 },
         ].map(r => `
           <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(20,20,35,0.6);border-radius:8px;border:1px solid rgba(184,152,95,0.2)">
             <span style="color:#d4af37;font-weight:600;font-size:13px">${r.rank}</span>
             <span style="color:#e0e0e0;font-size:12px;display:flex;gap:10px;align-items:center">
               <span>${pearlIcon}${r.pearl}</span>

             </span>

       <p style="color:#d4af37;margin-top:14px;font-size:12px">Current Rank: <strong>${rank.label}</strong> &mdash; ${stars} Stars</p>`
    );
  }

      .atp-panel {
        position:relative;background:linear-gradient(135deg,rgba(10,14,32,0.99),rgba(6,8,20,0.99));
        border:3px solid #b8985f;border-radius:18px;padding:22px;width:min(860px,96vw);
        max-height:92vh;overflow-y:auto;box-shadow:0 0 60px rgba(184,152,95,0.35);
      }

      .atp-teams { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
      @media(max-width:700px) { .atp-teams { grid-template-columns:1fr; } }
      .atp-team-card {
        background:rgba(18,22,42,0.7);border:2px solid rgba(139,115,85,0.3);border-radius:12px;
        padding:14px 16px;cursor:pointer;transition:all 0.2s;position:relative;

      .atp-members { display:flex;gap:10px;flex-wrap:wrap; }

      .atp-portrait { width:50px;height:50px;border-radius:50%;background-size:cover;background-position:center top;border:2px solid #b8985f;flex-shrink:0; }
      .atp-member-info { flex:1;min-width:0; }
      .atp-member-name { font-size:12px;font-weight:700;color:#d4af37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
      .atp-member-ver { font-size:10px;color:#9a8060;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
      .atp-jutsu-row { display:flex;align-items:center;gap:6px;margin-top:5px; }
      .atp-jutsu-icon { width:22px;height:22px;border-radius:4px;background-size:cover;background-position:center;border:1px solid rgba(212,175,55,0.4);flex-shrink:0; }
      .atp-jutsu-name { font-size:10px;color:#b8a080;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1; }
      .atp-chakra { font-size:10px;color:#60a5fa;font-weight:700;flex-shrink:0; }
      .atp-footer { display:flex;gap:12px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(184,152,95,0.2);align-items:center;justify-content:space-between; }
      .atp-link-btn { font-size:12px;color:#b8985f;border:1px solid rgba(184,152,95,0.35);padding:8px 14px;border-radius:8px;text-decoration:none;font-family:"Cinzel",serif;transition:all 0.2s; }
      .atp-link-btn:hover { border-color:#d4af37;color:#d4af37; }

        padding:12px 28px;font-family:"Cinzel",serif;font-size:13px;font-weight:700;
        background:linear-gradient(135deg,#a7822c,#d4af37);border:2px solid rgba(212,175,55,0.7);
        color:#0a0a0a;border-radius:8px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;
      }
      .atp-confirm:hover:not(:disabled) { background:linear-gradient(135deg,#d4af37,#ffd700);box-shadow:0 0 20px rgba(212,175,55,0.4); }
      .atp-confirm:disabled { opacity:0.35;cursor:not-allowed; }
      @media(max-width:600px) { .atp-member { min-width:100%; } .atp-members { flex-direction:column; } }
    `;
    document.head.appendChild(s);
  }

  function _showArenaInfoModal(title, bodyHTML) {
    document.getElementById('arena-info-modal')?.remove();
    const modal = document.createElement('div');
    modal.id = 'arena-info-modal';
    modal.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:9998;"
           onclick="document.getElementById('arena-info-modal').remove()"></div>
      <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;
                  background:linear-gradient(135deg,rgba(15,20,45,0.98),rgba(8,10,25,0.98));
                  border:3px solid #b8985f;border-radius:18px;padding:28px;width:min(540px,92vw);
                  max-height:88vh;overflow-y:auto;box-shadow:0 0 60px rgba(184,152,95,0.4);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid rgba(184,152,95,0.3);">
          <span style="font-size:20px;font-weight:700;color:#d4af37;letter-spacing:1px">${title}</span>
          <button onclick="document.getElementById('arena-info-modal').remove()"
                  style="background:rgba(220,53,69,0.2);border:2px solid rgba(220,53,69,0.5);color:#ff6b6b;font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;font-weight:700">X</button>
        </div>
        <div style="font-size:14px;">${bodyHTML}</div>
      </div>`;
    document.body.appendChild(modal);
  }
</script>
