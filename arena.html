<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blazing — Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <!-- PWA App Container -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="Blazing" />
  <meta name="theme-color" content="#000000" />
  <link rel="apple-touch-icon" href="assets/icons/achievement_icon.png" />
  <script src="js/pwa-register.js"></script>
  <link rel="stylesheet" href="css/bottombar.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap");

    *, *::before, *::after { box-sizing: border-box; }
    body::-webkit-scrollbar, *::-webkit-scrollbar { display: none; }
    body, * { -ms-overflow-style: none; scrollbar-width: none; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #080810;
      color: #eee6d1;
      font-family: "Cinzel", serif;
      overflow-x: hidden;
    }

    /* ── Background ─────────────────────────────────────────── */
    #arena-bg {
      position: fixed;
      inset: 0;
      background-image: url('assets/Main Background/arena_background.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #arena-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.25) 35%,
        rgba(0,0,0,0.65) 100%
      );
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .arena-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px 16px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1.arena-title {
      font-size: clamp(26px, 5vw, 52px);
      color: #d4af37;
      letter-spacing: clamp(3px, 0.6vw, 8px);
      text-shadow:
        0 4px 20px rgba(212,175,55,0.9),
        0 0 60px rgba(255,120,0,0.45),
        0 2px 4px rgba(0,0,0,0.9);
      margin: 0 0 6px;
      text-align: center;
    }

    .arena-subtitle {
      font-size: clamp(10px, 1.5vw, 14px);
      color: rgba(255,220,150,0.7);
      letter-spacing: 2px;
      margin: 0 0 28px;
      text-align: center;
    }

    /* ── Player Rank Card ───────────────────────────────────── */
    .player-rank-card {
      background: rgba(10,10,20,0.88);
      border: 2px solid rgba(212,175,55,0.5);
      border-radius: 14px;
      padding: 18px 26px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }

    .rank-badge {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ffd700, #a7822c 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(255,215,0,0.6);
      box-shadow: 0 0 16px rgba(255,215,0,0.4);
    }

    .rank-badge-stars {
      font-size: 9px;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
    }

    .rank-badge-label {
      font-size: 7px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.2;
      margin-top: 2px;
    }

    .rank-info { flex: 1; }

    .rank-name {
      font-size: 1.1rem;
      color: #d4af37;
      font-weight: 700;
    }

    .rank-tier-label {
      font-size: 0.75rem;
      color: rgba(217,179,98,0.6);
      margin-top: 2px;
    }

    .rank-stars-bar {
      margin-top: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }

    .rank-stars-fill {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, #d4af37, #ffd700);
      transition: width 0.5s ease;
    }

    .rank-stars-text {
      font-size: 0.7rem;
      color: rgba(217,179,98,0.65);
      margin-top: 4px;
    }

    /* ── Action Buttons ─────────────────────────────────────── */
    .arena-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .arena-btn {
      font-family: "Cinzel", serif;
      font-size: clamp(10px, 1.3vw, 13px);
      font-weight: 600;
      letter-spacing: 1px;
      padding: clamp(10px,1.5vh,14px) clamp(18px,3vw,32px);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    }

    .arena-btn-primary {
      background: linear-gradient(135deg, #a7822c, #d4af37);
      border: 2px solid rgba(212,175,55,0.7);
      color: #0a0a0a;
    }

    .arena-btn-primary:hover {
      background: linear-gradient(135deg, #d4af37, #ffd700);
      box-shadow: 0 0 24px rgba(212,175,55,0.6), 0 4px 14px rgba(0,0,0,0.6);
      transform: translateY(-2px);
    }

    .arena-btn-secondary {
      background: rgba(10,10,20,0.85);
      border: 2px solid rgba(212,175,55,0.35);
      color: #d4af37;
    }

    .arena-btn-secondary:hover {
      border-color: rgba(212,175,55,0.7);
      background: rgba(212,175,55,0.12);
      transform: translateY(-2px);
    }

    .arena-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── Ranking Table ──────────────────────────────────────── */
    .ranking-section {
      width: 100%;
      max-width: 680px;
    }

    .ranking-section-title {
      font-size: 0.85rem;
      color: rgba(217,179,98,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }

    .rank-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(8,8,16,0.85);
      border: 1px solid rgba(217,179,98,0.15);
      border-radius: 12px;
      overflow: hidden;
    }

    .rank-table thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: rgba(217,179,98,0.6);
      border-bottom: 1px solid rgba(217,179,98,0.15);
      background: rgba(217,179,98,0.05);
    }

    .rank-table tbody tr {
      border-bottom: 1px solid rgba(217,179,98,0.07);
      transition: background 0.15s;
    }

    .rank-table tbody tr:last-child { border-bottom: none; }
    .rank-table tbody tr:hover { background: rgba(217,179,98,0.06); }

    .rank-table tbody tr.current-rank {
      background: rgba(212,175,55,0.12);
      border-left: 3px solid #d4af37;
    }

    .rank-table tbody td {
      padding: 10px 14px;
      font-size: 0.8rem;
    }

    .rank-name-cell {
      color: #d4af37;
      font-weight: 600;
    }

    .rank-tier-cell {
      color: rgba(238,230,209,0.6);
      font-size: 0.72rem;
    }

    .rank-stars-cell {
      color: rgba(238,230,209,0.85);
      font-size: 0.75rem;
    }

    .rank-star-icon { color: #ffd700; }

    /* ── Back link ──────────────────────────────────────────── */
    .arena-back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 22px;
      background: rgba(10,10,20,0.85);
      border: 2px solid rgba(212,175,55,0.5);
      border-radius: 8px;
      color: #d4af37;
      font-family: "Cinzel", serif;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .arena-back-btn:hover {
      background: rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.9);
      box-shadow: 0 0 20px rgba(212,175,55,0.4);
    }

    @media (max-width: 500px) {
      .player-rank-card { padding: 14px 16px; }
      .rank-badge { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <div id="arena-bg"></div>

  <div class="arena-page">
    <h1 class="arena-title">ARENA</h1>
    <p class="arena-subtitle">Prove your worth as a shinobi</p>

    <!-- Player's current rank -->
    <div class="player-rank-card" id="player-rank-card">
      <div class="rank-badge" id="rank-badge">
        <div class="rank-badge-stars" id="rank-badge-stars">☆☆</div>
        <div class="rank-badge-label" id="rank-badge-label">Academy<br>Student</div>
      </div>
      <div class="rank-info">
        <div class="rank-name" id="rank-name-display">Academy Student</div>
        <div class="rank-tier-label" id="rank-tier-display">Tier 2 — 0 / 2 Stars</div>
        <div class="rank-stars-bar">
          <div class="rank-stars-fill" id="rank-stars-fill" style="width:0%"></div>
        </div>
        <div class="rank-stars-text" id="rank-stars-text">0 Arena Stars total</div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="arena-actions">
      <button class="arena-btn arena-btn-primary" id="btn-battle-arena" onclick="openArenaBattle()">
        ⚔ Battle
      </button>
      <button class="arena-btn arena-btn-secondary" onclick="alert('Defense team setup coming soon!')">
        🛡 Set Defense
      </button>
      <button class="arena-btn arena-btn-secondary" onclick="alert('Season rewards coming soon!')">
        🏆 Rewards
      </button>
    </div>

    <!-- Full ranking table -->
    <div class="ranking-section">
      <div class="ranking-section-title">Rank Progression</div>
      <table class="rank-table" id="rank-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Tiers</th>
            <th>Stars Required</th>
          </tr>
        </thead>
        <tbody id="rank-table-body"></tbody>
      </table>
    </div>

    <a href="village.html" class="arena-back-btn">← Return to Village</a>
  </div>

  <!-- Bottom navigation bar -->
  <div class="bottom-bar">
    <div class="bottom-bar-content">
      <button class="hud-button" id="btn-village" aria-label="Village">
        <img src="assets/icons/village_btm_btn.png" alt="Village">
      </button>
      <button class="hud-button" id="btn-characters" aria-label="Characters">
        <img src="assets/icons/characters_icon.png" alt="Characters" onerror="this.style.display='none'">
      </button>
      <button class="hud-button" id="btn-fusion" aria-label="Fusion">
        <img src="assets/icons/fusion_btm_btn.png" alt="Fusion">
      </button>
      <button class="hud-button" id="btn-teams" aria-label="Teams">
        <img src="assets/icons/teams_icon.png" alt="Teams">
      </button>
      <button class="hud-button" id="btn-tools" aria-label="Tools">
        <img src="assets/icons/guilds_icon.png" alt="Tools">
      </button>
      <button class="hud-button" id="btn-summon" aria-label="Summon">
        <img src="assets/icons/summon_btm_btn.png" alt="Summon">
      </button>
      <button class="hud-button" id="btn-missions" aria-label="Missions">
        <img src="assets/icons/mission_btm_btn.png" alt="Missions">
      </button>
      <button class="hud-button" id="btn-inventory" aria-label="Inventory">
        <img src="assets/icons/inventory_icon.png" alt="Inventory">
      </button>
      <button class="hud-button" id="btn-shop" aria-label="Shop">
        <img src="assets/icons/shop_btm_btn.png" alt="Shop">
      </button>
    </div>
  </div>

  <script src="js/resources.js"></script>
  <script>
  // ── Arena Rank Definitions ──────────────────────────────────────────────
  const ARENA_RANKS = [
    { name: 'Academy Student', tiers: 2, starsPerTier: 2 },
    { name: 'Genin',           tiers: 3, starsPerTier: 3 },
    { name: 'Chunin',          tiers: 3, starsPerTier: 4 },
    { name: 'Special Jounin',  tiers: 2, starsPerTier: 4 },
    { name: 'Jounin',          tiers: 2, starsPerTier: 5 },
    { name: 'Elite Jounin',    tiers: 2, starsPerTier: 5 },
    { name: 'ANBU',            tiers: 2, starsPerTier: 6 },
    { name: 'ANBU Captain',    tiers: 2, starsPerTier: 6 },
    { name: 'Shadow Kage',     tiers: 1, starsPerTier: 7  },
    { name: 'Sannin',          tiers: 1, starsPerTier: 8  },
    { name: 'Kage',            tiers: 1, starsPerTier: 10 },
    { name: 'Six Paths',       tiers: 1, starsPerTier: 12 },
    { name: 'Shinobi Legend',  tiers: 1, starsPerTier: 15 },
  ];

  function buildRankList() {
    const list = [];
    ARENA_RANKS.forEach(r => {
      for (let t = r.tiers; t >= 1; t--) {
        list.push({
          name: r.name,
          tier: r.tiers > 1 ? `T${t}` : 'T1',
          starsNeeded: r.starsPerTier,
          label: r.tiers > 1 ? `${r.name} T${t}` : r.name,
          totalStarsLabel: r.tiers > 1 ? `${r.starsPerTier} ★ per tier` : `${r.starsPerTier} ★`
        });
      }
    });
    return list;
  }

  function getArenaStars() {
    return Number(localStorage.getItem('arena_stars') || 0);
  }

  function getCurrentRankIndex(stars) {
    const list = buildRankList();
    let cumulative = 0;
    for (let i = 0; i < list.length; i++) {
      cumulative += list[i].starsNeeded;
      if (stars < cumulative) return { idx: i, starsInTier: stars - (cumulative - list[i].starsNeeded), rank: list[i] };
    }
    return { idx: list.length - 1, starsInTier: stars, rank: list[list.length - 1] };
  }

  function renderRankTable() {
    const tbody = document.getElementById('rank-table-body');
    if (!tbody) return;
    const stars = getArenaStars();
    const { idx } = getCurrentRankIndex(stars);
    const list = buildRankList();

    tbody.innerHTML = list.map((r, i) => `
      <tr class="${i === idx ? 'current-rank' : ''}">
        <td class="rank-name-cell">${r.label}${i === idx ? ' ← You' : ''}</td>
        <td class="rank-tier-cell">${r.tier}</td>
        <td class="rank-stars-cell"><span class="rank-star-icon">★</span> ${r.totalStarsLabel}</td>
      </tr>`).join('');
  }

  function renderPlayerRank() {
    const stars = getArenaStars();
    const { idx, starsInTier, rank } = getCurrentRankIndex(stars);

    document.getElementById('rank-name-display').textContent = rank.label;
    document.getElementById('rank-tier-display').textContent = `${rank.tier} — ${starsInTier} / ${rank.starsNeeded} ★`;
    document.getElementById('rank-badge-label').textContent = rank.name.replace(' ', '\n');
    document.getElementById('rank-badge-stars').textContent = '★'.repeat(Math.min(starsInTier, rank.starsNeeded));
    document.getElementById('rank-stars-text').textContent = `${stars} Arena Stars total`;

    const pct = Math.min(100, Math.round((starsInTier / rank.starsNeeded) * 100));
    document.getElementById('rank-stars-fill').style.width = pct + '%';
    document.getElementById('rank-tier-display').textContent =
      `${rank.tier} — ${starsInTier} / ${rank.starsNeeded} Stars`;
  }

  renderRankTable();
  renderPlayerRank();

  // ── Arena Battle Maps ────────────────────────────────────────────────────
  const ARENA_MAPS = [
    'bg_020101_mori','bg_030101_kaido','bg_040101_heigen','bg_050101_iwaba',
    'bg_060101_kouya','bg_070101_kawara','bg_080101_sabaibaru','bg_090101_oohashi',
    'bg_100101_shinomori','bg_110101_yosen','bg_120101_honsen','bg_130101_tanzaku',
    'bg_140101_syumatu','bg_150101_suna','bg_160101_akatuki','bg_170101_tenti',
    'bg_180101_oroti','bg_190101_hinotera','bg_200101_kankin','bg_220101_konoha_houkai',
    'bg_230101_utiha','bg_240101_tetu','bg_250101_samurai','bg_260101_unrai',
    'bg_270101_kitaajito','bg_280101_doukutu','bg_290101_kaigan','bg_300101_sabaku',
    'bg_310101_shinjyu','bg_330101_konohasato','bg_340101_kihinseki','bg_350101_kinoko',
    'bg_360101_takenoko','bg_370101_senjyou','bg_400101_ame_soto','bg_420101_utiha2',
    'bg_440101_shinjitu','bg_450101_kukan','bg_460101_yougan','bg_470101_hyouzan',
    'bg_490101_tyojuryoku','bg_500101_fusyujyou','bg_510101_shinratensei',
    'bg_520101_ninkaibuto','bg_530101_jigokudani','bg_540101_rpg','bg_580101_syuumatunotani',
    'bg_590101_hondou','bg_600101_isidan'
  ];

  function randomMap() {
    return 'assets/maps/' + ARENA_MAPS[Math.floor(Math.random() * ARENA_MAPS.length)] + '.png';
  }

  // ── Arena Battle Flow ────────────────────────────────────────────────────
  async function openArenaBattle() {
    // Determine current rank for difficulty scaling
    const stars = getArenaStars();
    const { rank } = getCurrentRankIndex(stars);

    // Decide which ranks can be opponents (Academy Student through Chunin → lower tier enemies)
    const lowRanks = ['Academy Student', 'Genin', 'Chunin'];
    const isLowRank = lowRanks.includes(rank.name);

    // Load characters and pick random opponents
    let allChars = [];
    try {
      const r = await fetch('data/characters.json');
      const data = await r.json();
      allChars = Array.isArray(data) ? data : Object.values(data);
    } catch (e) {
      console.error('[Arena] Failed to load characters:', e);
    }

    if (allChars.length === 0) {
      alert('Could not load enemy data.');
      return;
    }

    // For lower ranks pick enemies filtered to lower rarities, else open pool
    let pool = allChars;
    if (isLowRank) {
      const low = allChars.filter(c => {
        const r = parseInt(c.rarity) || parseInt((c.starMinCode || '').charAt(0)) || 1;
        return r <= 4;
      });
      if (low.length >= 4) pool = low;
    }

    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const enemyTeam = shuffle(pool).slice(0, 4).map(c => ({
      id: c.id,
      name: c.name,
      rarity: c.rarity || c.starMinCode || '1',
      icon: c.icon || '',
      hp: (c.statsMax && c.statsMax.hp) || 5000,
      atk: (c.statsMax && c.statsMax.atk) || 800,
      spd: (c.statsMax && c.statsMax.spd) || 100,
    }));

    showTeamSelectorModal(enemyTeam);
  }

  function showTeamSelectorModal(enemyTeam) {
    // Load player's team from localStorage
    let playerTeam = [];
    try {
      const saved = localStorage.getItem('blazing_active_team') || localStorage.getItem('currentTeam');
      if (saved) playerTeam = JSON.parse(saved);
    } catch(e) {}

    const mapPath = randomMap();

    const enemyHTML = enemyTeam.map(e => `
      <div class="arena-team-member">
        <div class="arena-member-avatar" style="${e.icon ? `background-image:url('${e.icon}')` : 'background:#333'}"></div>
        <div class="arena-member-name">${e.name}</div>
      </div>`).join('');

    const playerHTML = playerTeam.length > 0
      ? playerTeam.slice(0, 4).map(uid => {
          const inv = (() => { try { return JSON.parse(localStorage.getItem('blazing_character_inventory_v3') || '{}'); } catch(e) { return {}; } })();
          const inst = inv[uid] || {};
          return `<div class="arena-team-member">
            <div class="arena-member-avatar" style="${inst.icon ? `background-image:url('${inst.icon}')` : 'background:#444'}"></div>
            <div class="arena-member-name">${inst.name || uid}</div>
          </div>`;
        }).join('')
      : '<div class="arena-no-team">No team set — default characters will be used</div>';

    const modal = document.createElement('div');
    modal.id = 'arena-team-modal';
    modal.innerHTML = `
      <div class="arena-modal-overlay" onclick="document.getElementById('arena-team-modal').remove()"></div>
      <div class="arena-modal-panel">
        <div class="arena-modal-header">
          <span class="arena-modal-title">⚔ Arena Battle</span>
          <button class="arena-modal-close" onclick="document.getElementById('arena-team-modal').remove()">✕</button>
        </div>
        <div class="arena-modal-body">
          <div class="arena-teams-row">
            <div class="arena-team-col">
              <div class="arena-team-label">Your Team</div>
              <div class="arena-team-grid">${playerHTML}</div>
            </div>
            <div class="arena-vs-badge">VS</div>
            <div class="arena-team-col">
              <div class="arena-team-label enemy-label">Enemy Team</div>
              <div class="arena-team-grid">${enemyHTML}</div>
            </div>
          </div>
          <div class="arena-map-preview" style="background-image:url('${mapPath}')">
            <span class="arena-map-label">Battle Map</span>
          </div>
        </div>
        <button class="arena-start-match-btn" onclick="startArenaBattle(${JSON.stringify(enemyTeam).replace(/"/g, '&quot;')}, '${mapPath}')">
          Start Matching
        </button>
      </div>`;

    // Inject styles
    if (!document.getElementById('arena-battle-modal-styles')) {
      const style = document.createElement('style');
      style.id = 'arena-battle-modal-styles';
      style.textContent = `
        #arena-team-modal { position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center; }
        .arena-modal-overlay { position:absolute;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px); }
        .arena-modal-panel {
          position:relative;background:linear-gradient(135deg,rgba(15,20,45,0.98),rgba(8,10,25,0.98));
          border:3px solid #b8985f;border-radius:18px;padding:28px;width:min(700px,95vw);
          max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(184,152,95,0.4);
        }
        .arena-modal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid rgba(184,152,95,0.3); }

  function startArenaBattle(enemyTeam, mapPath) {
    // Store arena battle data in localStorage
    localStorage.setItem('arena_battle_mode', '1');
    localStorage.setItem('arena_enemies', JSON.stringify(enemyTeam));
    localStorage.setItem('arena_map', mapPath);
    // Navigate to battle
    window.location.href = 'battle.html';
  }
